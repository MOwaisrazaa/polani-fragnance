<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout — Polani Fragrance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Montserrat:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <script defer src="js/data.js"></script>
    <script defer src="js/app.js"></script>
  </head>
  <body class="page-checkout">
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="header header--simple" data-header>
      <div class="container header__inner">
        <a class="brand" href="index.html" aria-label="Polani Fragrance Home">
          <span class="brand__wordmark">POLANI</span>
          <span class="brand__sub">FRAGRANCE</span>
        </a>
        <nav class="nav nav--simple" aria-label="Primary">
          <a class="nav__link" href="men.html">Shop</a>
          <a class="nav__link" href="cart.html">Cart</a>
        </nav>
      </div>
    </header>

    <main id="main" class="section section--ivory">
      <div class="container checkout" data-checkout-page>
        <h1 class="section-title">Checkout</h1>
        <div class="checkout__grid">
          <form class="checkout__form" data-checkout-form>
            <div class="grid-2">
              <label class="field">
                <span class="field__label">Name</span>
                <input name="name" required />
              </label>
              <label class="field">
                <span class="field__label">Phone</span>
                <input name="phone" required />
              </label>
            </div>
            <label class="field">
              <span class="field__label">Address</span>
              <input name="address" required />
            </label>
            <div class="grid-2">
              <label class="field">
                <span class="field__label">Email</span>
                <input name="email" type="email" required />
              </label>
              <label class="field">
                <span class="field__label">City</span>
                <input name="city" required />
              </label>
            </div>

            <div class="field">
              <div class="field__label">Payment Method</div>
              <label class="radio"><input type="radio" name="pay" value="cod" checked /> COD</label>
              <label class="radio"><input type="radio" name="pay" value="bank" /> Bank Transfer</label>
              <label class="radio"><input type="radio" name="pay" value="easypaisa" /> Easypaisa</label>
              <label class="radio"><input type="radio" name="pay" value="jazzcash" /> JazzCash</label>
            </div>

            <button class="btn btn--primary w-100" type="submit">Place Order</button>
            <div class="form-note muted" data-order-note hidden>Order placed (demo). Thank you!</div>
          </form>

          <aside class="checkout__summary" aria-label="Summary">
            <div class="summary">
              <div class="summary__title">Order Summary</div>
              <div class="summary__row"><span>Items</span><span data-items>0</span></div>
              <div class="summary__row summary__row--total"><span>Total</span><span data-total>$0.00</span></div>
              <div class="mini-note muted">Prices shown for demo layout.</div>
            </div>
          </aside>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="container footer__bottom">
        <div class="footer__copy">© <span data-year></span> Polani Fragrance. All rights reserved.</div>
      </div>
    </footer>
  </body>
</html>
