<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart — Polani Fragrance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Montserrat:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <script defer src="js/data.js"></script>
    <script defer src="js/app.js"></script>
  </head>
  <body class="page-cart">
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="header header--simple" data-header>
      <div class="container header__inner">
        <a class="brand" href="index.html" aria-label="Polani Fragrance Home">
          <span class="brand__wordmark">POLANI</span>
          <span class="brand__sub">FRAGRANCE</span>
        </a>
        <nav class="nav nav--simple" aria-label="Primary">
          <a class="nav__link" href="men.html">Shop</a>
          <a class="nav__link" href="contact.html">Contact</a>
        </nav>
        <div class="header-actions">
          <a class="icon-btn" href="cart.html" aria-label="Cart">
            <span class="icon" aria-hidden="true" data-icon="cart"></span>
            <span class="badge" data-cart-count>0</span>
          </a>
        </div>
      </div>
    </header>

    <main id="main" class="section section--ivory">
      <div class="container cart" data-cart-page>
        <div class="cart__head">
          <h1 class="section-title">Your Cart</h1>
          <a class="btn btn--ghost btn--dark" href="men.html">Continue Shopping</a>
        </div>

        <div class="cart__grid">
          <div class="cart__items" data-cart-items></div>

          <aside class="cart__summary" aria-label="Summary">
            <div class="summary">
              <div class="summary__title">Order Summary</div>
              <div class="summary__row"><span>Subtotal</span><span data-subtotal>$0.00</span></div>
              <div class="summary__row"><span>Shipping</span><span class="muted">Calculated at checkout</span></div>
              <div class="summary__row summary__row--total"><span>Total</span><span data-total>$0.00</span></div>

              <form class="coupon" data-coupon>
                <input type="text" name="coupon" placeholder="Coupon code" />
                <button class="btn btn--ghost btn--dark" type="submit">Apply</button>
              </form>
              <a class="btn btn--primary w-100" href="checkout.html">Checkout</a>
              <div class="mini-note muted">Demo checkout (no payment).</div>
            </div>
          </aside>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="container footer__bottom">
        <div class="footer__copy">© <span data-year></span> Polani Fragrance. All rights reserved.</div>
      </div>
    </footer>
  </body>
</html>
